<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ Live Football</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; font-family: sans-serif; }
    
    .header {
      background: #1a1a2e;
      color: white;
      text-align: center;
      padding: 12px;
      font-size: 18px;
      font-weight: bold;
    }
    
    .player-container {
      width: 100%;
      height: calc(100vh - 48px);
    }
    
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="header">⚽ FIFA World Cup 2026 — Live</div>

  <div class="player-container">
    <iframe
      src="https://player.twitch.tv/?channel=cazevirtual&parent=arthurpeterson0010-bot.github.io"
      allowfullscreen
      allow="autoplay">
    </iframe>
  </div>

</body>
</html>
