<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ Live Football</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: sans-serif; color: white; }
    .header {
      background: #1a1a2e;
      text-align: center;
      padding: 12px;
      font-size: 17px;
      font-weight: bold;
    }
    .player {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
    }
    .player iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .note {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      padding: 12px;
    }
  </style>
</head>
<body>

  <div class="header">⚽ FIFA World Cup 2026 — Live Free</div>

  <div class="player">
    <iframe
      src="https://www.youtube.com/embed/BJV3-1huA4M?autoplay=1"
      allowfullscreen
      allow="autoplay; encrypted-media">
    </iframe>
  </div>

  <p class="note">Powered by Cazé TV 🇧🇷 — Free & Legal</p>

</body>
</html>
